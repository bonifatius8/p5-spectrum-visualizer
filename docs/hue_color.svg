<svg xmlns="http://www.w3.org/2000/svg" width="760" height="175" style="background:#0d0d1a;border-radius:8px">
<style>text{font-family:ui-monospace,monospace,sans-serif}</style>
<defs>
  <linearGradient id="gl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="hsl(0,90%,30%)"/>
    <stop offset="100%" stop-color="hsl(20,90%,52%)"/>
  </linearGradient>
  <linearGradient id="gm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="hsl(90,80%,30%)"/>
    <stop offset="100%" stop-color="hsl(130,80%,52%)"/>
  </linearGradient>
  <linearGradient id="gh" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="hsl(220,85%,38%)"/>
    <stop offset="100%" stop-color="hsl(270,85%,58%)"/>
  </linearGradient>
</defs><rect x="20" y="38" width="210" height="78" fill="url(#gl)" rx="4"/><text x="125" y="29" text-anchor="middle" font-size="11" fill="#999">低域  < 500Hz</text><text x="125" y="133" text-anchor="middle" font-size="11" fill="#777">bias 0 → 赤系</text><rect x="250" y="38" width="255" height="78" fill="url(#gm)" rx="4"/><text x="377.5" y="29" text-anchor="middle" font-size="11" fill="#999">中域  500Hz – 4kHz</text><text x="377.5" y="133" text-anchor="middle" font-size="11" fill="#777">bias 100 → 緑系</text><rect x="525" y="38" width="215" height="78" fill="url(#gh)" rx="4"/><text x="632.5" y="29" text-anchor="middle" font-size="11" fill="#999">高域  > 4kHz</text><text x="632.5" y="133" text-anchor="middle" font-size="11" fill="#777">bias 250 → 青紫系</text><text x="380" y="167" text-anchor="middle" font-size="10" fill="#555">3帯域のエネルギー比で加重平均 → 全20円の色相オフセットとして毎フレーム適用</text></svg>